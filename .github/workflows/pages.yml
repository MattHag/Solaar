name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0

      - name: Install dependencies
        run: bundle install
        working-directory: './docs'

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install Sphinx and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx
          pip install sphinx-rtd-theme

      - name: Generate Python documentation
        run: |
          cd lib
          sphinx-quickstart -q -p "Your Project" -a "Your Name" -v "0.1" -r "0.1" --ext-autodoc --ext-viewcode
          make html
        working-directory: ./lib

      - name: Move Python docs to Jekyll site
        run: |
          rm -rf docs/python_docs
          mv lib/build/html docs/python_docs

      - name: Build site
        run: bundle exec jekyll build
        working-directory: './docs'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
